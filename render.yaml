services:
  - type: web
    name: airflow-backend
    runtime: node
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: air.flow@gmx.de
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: FRONTEND_URL
        value: https://airflow-dashboard.vercel.app
      - key: WEBSITE_URL
        value: https://airflow.maxpromo.digital
